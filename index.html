<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARK Analytics Academy</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("background - Copy.png") center/cover no-repeat;
color:white;
height:100vh;
overflow:hidden;
}
.footer{
position:absolute;
bottom:0;
width:100%;
height:50px;

display:flex;
justify-content:center;
align-items:center;

background:rgba(10,20,60,0.8);
backdrop-filter:blur(6px);
}

.footer-links a{
color:white;
margin:0 20px;
text-decoration:none;
font-size:14px;
opacity:0.8;
}

.footer-links a:hover{
opacity:1;
}
/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:60px;
background:rgba(10,20,60,0.9);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
height:36px;
}

.brandtext{
line-height:1.1;
}

.brandtext b{
font-size:18px;
}

.brandtext span{
font-size:12px;
opacity:.8;
}

.navlinks a{
margin-left:25px;
color:white;
text-decoration:none;
font-size:14px;
}

/* TITLE */

.title{
text-align:center;
margin-top:100px;
font-size:48px;
font-weight:bold;
text-shadow:0 0 20px cyan;
}

/* TOP PANELS */

.top-panels{
display:flex;
justify-content:center;
gap:160px;
margin-top:70px;
}

.panel{
width:260px;
height:220px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.06);
border-radius:16px;

backdrop-filter:blur(6px);

box-shadow:
0 10px 40px rgba(0,0,0,0.6),
0 0 30px rgba(0,255,255,0.25);

transform:perspective(900px) rotateX(6deg);

padding:10px;
}
@keyframes floatPanel{
0%{ transform:perspective(900px) rotateX(6deg) translateY(0px); }
50%{ transform:perspective(900px) rotateX(6deg) translateY(-6px); }
100%{ transform:perspective(900px) rotateX(6deg) translateY(0px); }
}

.panel{
animation:floatPanel 6s ease-in-out infinite;
}

.panel::before{
content:"";
position:absolute;
width:180px;
height:120px;

background:radial-gradient(circle, rgba(0,255,255,0.3), transparent);

filter:blur(30px);
z-index:-1;
}
.top-panels{
gap:180px;
}

.panel img{
width:100%;
object-fit:contain;
}

/* PERSON */

.person{
position:absolute;
bottom:230px;
left:50%;
transform:translateX(-50%);
height:200px;
mix-blend-mode:multiply;
}

/* BOTTOM PANELS */

.bottom-panels{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:160px;
}

/* QR CARD */

.qrbox{
width:240px;
height:220px;

background:rgba(255,255,255,0.15);
border-radius:20px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

backdrop-filter:blur(10px);

box-shadow:0 0 35px rgba(255,255,255,0.35);
}

.qrbox img{
width:140px;
}

.qrtext{
font-size:14px;
text-align:center;
margin-bottom:8px;
}

/* CHATBOT */

.chatbot{
position:fixed;
right:25px;
bottom:80px;   /* move above footer */
width:190px;
z-index:1000;  /* stay above footer */
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="brand">

<img src="logo - Copy.jpeg" class="logo">

<div class="brandtext">
<b>ARK ANALYTICS ACADEMY</b><br>
<span>Empowering Your Data Future</span>
</div>

</div>

<div class="navlinks">
<a>Courses</a>
<a>Learning Paths</a>
<a>About Us</a>
<a>Community</a>
<a>Login/Register</a>
<a>Contact</a>
</div>

</div>

<!-- TITLE -->

<div class="title">
MASTER THE LANGUAGE OF DATA & ANALYTICS
</div>

<!-- TOP PANELS -->

<div class="top-panels">

<div class="panel">
<img src="alteryx.png">
</div>

<div class="panel">
<img src="python.png">
</div>

<div class="panel">
<img src="tableau.png">
</div>

<div class="panel">
<img src="powerbi.png">
</div>

</div>

<!-- PERSON -->

<img src="man.png" class="person">

<!-- BOTTOM PANELS -->

<div class="bottom-panels">

<div class="panel">
<img src="sql.png">
</div>

<div class="qrbox">

<div class="qrtext">
Scan to Enroll & Start Your Journey
</div>

<img src="qr-code.png">

</div>

<div class="panel">
<img src="excel.png">
</div>

</div>

<!-- CHATBOT -->

<img src="chatbot - Copy.png" class="chatbot">
<footer class="footer">

<div class="footer-links">

<a href="#">Home</a>
<a href="#">About Us</a>
<a href="#">Privacy Policy</a>
<a href="#">Contact</a>

</div>

</footer>
</body>
</html>
