<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - ARK Analytics Academy</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("background - Copy.png") center/cover no-repeat;
color:white;

min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:rgba(10,20,60,0.9);
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
}

.header img{
height:40px;
}

/* TITLE */

.title{
text-align:center;
font-size:34px;
margin-top:40px;
text-shadow:0 0 20px cyan;
}

/* CONTACT SECTION */

.contact-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.contact-card{

width:650px;

background:rgba(255,255,255,0.08);
border-radius:20px;

padding:40px;

text-align:center;

backdrop-filter:blur(10px);

box-shadow:
0 0 35px rgba(0,255,255,0.3),
0 0 10px rgba(0,0,0,0.6);
}

/* TEXT */

.contact-card p{
font-size:16px;
line-height:1.6;
}

/* QR */

.qr{
margin:25px 0;
}

.qr img{
width:160px;
border-radius:10px;
box-shadow:0 0 15px rgba(255,255,255,0.4);
}

/* BUTTONS */

.contact-btn{

display:block;

margin:15px auto;

width:260px;

padding:12px;

border-radius:10px;

text-decoration:none;

color:white;

font-size:15px;

transition:0.3s;

}

/* PHONE */

.phone{
background:#25D366;
}

.phone:hover{
transform:scale(1.05);
box-shadow:0 0 15px #25D366;
}

/* EMAIL */

.email{
background:linear-gradient(90deg,#00e5ff,#9c27ff);
}

.email:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

/* FOOTER */

.footer{
background:rgba(10,20,60,0.9);
padding:15px;
text-align:center;
}

.footer a{
color:white;
margin:0 12px;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<img src="logo - Copy.jpeg">

<b>ARK Analytics Academy</b>

</div>

<div class="title">
Contact & Enrollment
</div>

<!-- CONTACT -->

<div class="contact-container">

<div class="contact-card">

<p>
Interested in joining ARK Analytics Academy?
Scan the QR code below to enroll or contact us directly.
</p>

<div class="qr">

<img src="qr-code.png">

</div>

<a href="tel:+919381578795" class="contact-btn phone">
📞 Call: 9381578795
</a>

<a href="mailto:arkconnect8@gmail.com" class="contact-btn email">
✉️ Email: arkconnect8@gmail.com
</a>

<p style="margin-top:25px">

Hyderabad, India

</p>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
<a href="about.html">About</a>
<a href="community.html">Community</a>

</div>

</body>

</html>
