<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARK Analytics Academy</title>

<style>

/* BODY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background_for_mobile.png");
background-size:cover;
background-position:center top;
background-repeat:no-repeat;
z-index:-1;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
background:rgba(6,15,45,0.95);
}

.logo-area{
display:flex;
align-items:center;
gap:8px;
}

.logo-area img{
height:34px;
}

.logo-text{
font-size:14px;
font-weight:bold;
line-height:1.2;
}

.tagline{
font-size:11px;
opacity:0.85;
}

.login-btn{
background:#00e6ff;
color:black;
padding:6px 14px;
border-radius:18px;
font-size:12px;
font-weight:bold;
text-decoration:none;
}

/* HERO */

.hero-text{
text-align:center;
font-size:20px;
font-weight:400;
letter-spacing:1px;
line-height:1.5;
padding:40px 25px;
text-shadow:0 0 10px rgba(0,0,0,0.7);
}

/* COURSES */

.courses{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
margin-top:20px;
}

.course-box{
width:90%;
max-width:340px;
margin-bottom:18px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,255,0.25);
}

/* QR */

.qr-section{
text-align:center;
margin-top:20px;
margin-bottom:100px;
}

.qr-title{
font-size:16px;
margin-bottom:10px;
font-weight:bold;
}

.qr-img{
width:140px;
border-radius:10px;
}

/* CHATBOT ICON */

@keyframes chatbotBlink{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.chatbot-icon{
position:fixed;
right:15px;
bottom:80px;
width:120px;
cursor:pointer;
z-index:999;
animation:chatbotBlink 2s infinite;
}

/* CHAT WINDOW */

.chat-window{
position:fixed;
right:10px;
bottom:150px;
width:90%;
max-width:320px;
background:white;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
color:black;
}

.chat-header{
background:#0a1f44;
color:white;
padding:10px;
font-weight:bold;
}

.chat-body{
height:220px;
padding:10px;
overflow-y:auto;
background:#f4f6fb;
font-size:14px;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
}

.chat-input button{
background:#0a1f44;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

/* FOOTER */

.mobile-footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(6,15,45,0.95);
display:flex;
justify-content:space-around;
align-items:center;
padding:12px 0;
font-size:14px;
z-index:1000;
}

.mobile-footer a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<div class="background"></div>

<!-- HEADER -->

<div class="header">

<div class="logo-area">

<img src="logo - Copy.jpeg">

<div class="logo-text">
ARK ANALYTICS ACADEMY
<div class="tagline">Empowering Your Data Future</div>
</div>

</div>

<a href="login.html" class="login-btn">Login</a>

</div>

<!-- HERO -->

<div class="hero-text">

BUILDING FUTURE<br>
LEADERS : WHERE<br>
KNOWLEDGE MEETS<br>
APPLICATION

</div>

<!-- COURSES -->

<div class="courses">

<img src="alteryx-mobile.png" class="course-box">
<img src="sql-mobile.png" class="course-box">
<img src="python-mobile.png" class="course-box">
<img src="tableau-mobile.png" class="course-box">
<img src="powerbi-mobile.png" class="course-box">
<img src="excel-mobile.png" class="course-box">

</div>

<!-- QR -->

<div class="qr-section">
<div class="qr-title">Scan to Enroll</div>
<img src="qr-code.png" class="qr-img">
</div>

<!-- CHATBOT ICON -->

<img src="chatbot - Copy.png" class="chatbot-icon" onclick="toggleChat()" ontouchstart="toggleChat()">

<!-- CHAT WINDOW -->

<div class="chat-window" id="chatWindow">

<div class="chat-header">
ARK AI Assistant
<span style="float:right;cursor:pointer;" onclick="toggleChat()">✖</span>
</div>

<div class="chat-body" id="chatBody">
👋 Hello! Welcome to ARK Analytics Academy.
</div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- FOOTER -->

<div class="mobile-footer">
<a href="mobile.html">Home</a>
<a href="mobile-about.html">About</a>
<a href="mobile-privacy.html">Privacy</a>
<a href="mobile-contact.html">Contact</a>
</div>

<script>

let step = 0;
let username = "";

function toggleChat(){
let chat=document.getElementById("chatWindow");

if(chat.style.display==="flex"){
chat.style.display="none";
}else{
chat.style.display="flex";
}
}

async function sendMessage(){

let input=document.getElementById("userInput");
let body=document.getElementById("chatBody");

let text=input.value;

body.innerHTML += "<p><b>You:</b> "+text+"</p>";

let response = await fetch("https://ark-backened.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text,
step:step,
name:username
})
});

let data = await response.json();

body.innerHTML += "<p><b>ARK AI:</b> "+data.reply+"</p>";

step = data.step;
username = data.name;

body.scrollTop = body.scrollHeight;

input.value="";

}

</script>

</body>
</html>
