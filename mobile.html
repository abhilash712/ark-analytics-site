<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARK Analytics Academy</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("background - Copy.png") center/cover no-repeat;
color:white;
text-align:center;
}
.login-btn{
margin-left:auto;
background:linear-gradient(90deg,#00e5ff,#9c27ff);
padding:6px 14px;
border-radius:8px;
text-decoration:none;
color:white;
font-size:14px;
}

/* HEADER */

.header{
background:rgba(10,20,60,0.9);
padding:15px;
display:flex;
align-items:center;
justify-content:flex-start;
gap:10px;
}

.header img{
height:35px;
}

.title{
font-size:28px;
margin-top:20px;
text-shadow:0 0 15px cyan;
}

/* COURSE GRID */

.course-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:25px;
}

.course-card{
background:rgba(255,255,255,0.08);
border-radius:14px;
padding:10px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.course-card img{
width:100%;
}

/* QR */

.qrbox{
margin:30px auto;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
width:200px;
}

.qrbox img{
width:150px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:rgba(10,20,60,0.9);
padding:14px;

display:flex;
justify-content:space-around;
align-items:center;

font-size:14px;
}

.footer a{
color:white;
margin:0 10px;
text-decoration:none;
}

/* CHATBOT ICON */

.chatbot-icon{
position:fixed;
right:15px;
bottom:80px;
width:65px;
z-index:9999;
cursor:pointer;
}

/* CHAT WINDOW */

.chat-window{
position:fixed;
right:10px;
bottom:140px;
width:90%;
max-width:320px;
background:white;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
color:black;
}

/* CHAT HEADER */

.chat-header{
background:#0a1f44;
color:white;
padding:10px;
font-weight:bold;
}

/* CHAT BODY */

.chat-body{
height:220px;
padding:10px;
overflow-y:auto;
background:#f4f6fb;
font-size:14px;
}

/* CHAT INPUT */

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
}

.chat-input button{
background:#0a1f44;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
<img src="logo - Copy.jpeg">
<b>ARK Analytics Academy</b>

<a href="login.html" class="login-btn">Login</a>

</div>

<!-- COURSES -->

<div class="course-grid">

<div class="course-card">
<img src="alteryx.png">
</div>

<div class="course-card">
<img src="python.png">
</div>

<div class="course-card">
<img src="tableau.png">
</div>

<div class="course-card">
<img src="powerbi.png">
</div>

<div class="course-card">
<img src="sql.png">
</div>

<div class="course-card">
<img src="excel.png">
</div>

</div>

<!-- QR -->

<div class="qrbox">
<p>Scan to Enroll</p>
<img src="qr-code.png">
</div>

<!-- CHATBOT ICON -->

<img src="chatbot - Copy.png" class="chatbot-icon" onclick="toggleChat()" ontouchstart="toggleChat()">

<!-- CHAT WINDOW -->

<div class="chat-window" id="chatWindow">

<div class="chat-header">
ARK AI Assistant
<span style="float:right;cursor:pointer;" onclick="toggleChat()">✖</span>
</div>

<div class="chat-body" id="chatBody">
👋 Hello! Welcome to ARK Analytics Academy.
</div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- FOOTER -->

<div class="footer">
<a href="mobile.html">Home</a>
<a href="mobile-about.html">About</a>
<a href="mobile-privacy.html">Privacy</a>
<a href="mobile-contact.html">Contact</a>
</div>

<script>

let step = 1;
let username = "";

function toggleChat(){
let chat=document.getElementById("chatWindow");

if(chat.style.display==="flex"){
chat.style.display="none";
}else{
chat.style.display="flex";
}
}

function sendMessage(){

let input=document.getElementById("userInput");
let body=document.getElementById("chatBody");

let text=input.value.toLowerCase();

body.innerHTML += "<p><b>You:</b> "+text+"</p>";

let reply="";

if(step===1){
reply="Hello 👋 What is your name?";
step=2;
}

else if(step===2){
username=text;
reply="Hi "+username+"! Are you a student or working professional?";
step=3;
}

else if(step===3){

if(text.includes("student")){
reply="Great! As a student you can start learning Data Analytics with us.";
}else{
reply="Nice! Upskilling in analytics will boost your career.";
}

reply += "<br><br>We teach Python, SQL, Tableau, Power BI, Alteryx and Advanced Excel.";

step=4;
}

else if(step===4){
reply="Please scan the QR code above to enroll.";
step=5;
}

else if(step===5){
reply="For further details call 📞 8309434566 or email 📧 aabhilash712@gmail.com.";
}

body.innerHTML += "<p><b>ARK AI:</b> "+reply+"</p>";

body.scrollTop = body.scrollHeight;

input.value="";

}

</script>

</body>
</html>
