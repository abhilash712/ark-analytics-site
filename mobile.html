<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARK Analytics Academy</title>

<style>


/* BODY */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* BACKGROUND IMAGE */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("background_for_mobile.png");
background-size:cover;
background-position:center top;
background-repeat:no-repeat;
z-index:-1;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
background:rgba(6,15,45,0.95);
}

/* LOGO AREA */

.logo-area{
display:flex;
align-items:center;
gap:8px;
}

.logo-area img{
height:34px;
}

.logo-text{
font-size:14px;
font-weight:bold;
line-height:1.2;
}

/* TAGLINE */

.tagline{
font-size:11px;
opacity:0.85;
}

/* LOGIN BUTTON */

.login-btn{
background:#00e6ff;
color:black;
padding:6px 14px;
border-radius:18px;
font-size:12px;
font-weight:bold;
text-decoration:none;
}
/* HERO TEXT */

/* HERO TEXT */

.hero-text{
text-align:center;
font-size:20px;
font-weight:400;
letter-spacing:1px;
line-height:1.5;
padding:40px 25px;
color:white;
text-shadow:
0px 0px 8px rgba(0,0,0,0.7),
0px 0px 15px rgba(0,0,0,0.6);
}

/* COURSE SECTION */

.courses{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
margin-top:20px;
}

/* COURSE BOX IMAGE */

.course-box{
width:90%;
max-width:340px;
margin-bottom:18px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,255,0.25);
}

/* QR SECTION */

.qr-section{
text-align:center;
margin-top:20px;
margin-bottom:80px;
}

.qr-title{
font-size:16px;
margin-bottom:10px;
font-weight:bold;
}

.qr-img{
width:140px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,255,255,0.4);
}

/* CHATBOT ICON */

@keyframes chatbotBlink{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.chatbot-icon{
position:fixed;
right:15px;
bottom:20px;
width:140px;
cursor:pointer;
z-index:999;
animation:chatbotBlink 2s infinite;
}
/* MOBILE FOOTER */

.mobile-footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:rgba(6,15,45,0.95);
display:flex;
justify-content:space-around;
align-items:center;
padding:12px 0;
font-size:14px;
z-index:1000;
}

/* FOOTER LINKS */

.mobile-footer a{
color:white;
text-decoration:none;
font-weight:500;
}

</style>

</head>
