
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARK Analytics Academy</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("background - Copy.png") center/cover no-repeat;
color:white;
text-align:center;
}

/* HEADER */

.header{
background:rgba(10,20,60,0.9);
padding:10px 15px;
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
}

.logo-section{
display:flex;
align-items:center;
gap:8px;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.logo-section img{
height:34px;
}

.logo-text{
font-size:15px;
font-weight:bold;
}

.login-btn{
background:cyan;
color:black;
padding:6px 14px;
border-radius:20px;
font-size:12px;
text-decoration:none;
font-weight:bold;
}

/* TAGLINE */

.tagline{
text-align:center;
font-size:13px;
opacity:0.9;
margin-top:6px;
}

/* TITLE */

.title{
font-size:24px;
margin:18px 10px;
text-shadow:0 0 12px cyan;
}

/* COURSE GRID */

.course-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:18px;
}

.course-card{
display:flex;
justify-content:center;
align-items:center;
height:150px;
}

.course-card img{
max-width:90%;
max-height:100%;
object-fit:contain;
}

/* QR */

.qrbox{
margin:20px auto 80px auto;
width:180px;
}

.qrbox img{
width:140px;
}

/* FOOTER */

.footer{
position:fixed;
bottom:0;
width:100%;
background:rgba(10,20,60,0.9);
padding:12px;
display:flex;
justify-content:space-around;
font-size:14px;
}

.footer a{
color:white;
text-decoration:none;
}

/* CHATBOT ICON */

@keyframes blinkAI{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.chatbot-icon{
position:fixed;
right:15px;
bottom:70px;
width:110px;
cursor:pointer;
z-index:9999;
animation:blinkAI 2s infinite;
}

/* CHAT WINDOW */

.chat-window{
position:fixed;
right:10px;
bottom:130px;
width:90%;
max-width:320px;
background:white;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
display:none;
flex-direction:column;
overflow:hidden;
z-index:9999;
color:black;
}

.chat-header{
background:#0a1f44;
color:white;
padding:10px;
font-weight:bold;
}

.chat-body{
height:220px;
padding:10px;
overflow-y:auto;
background:#f4f6fb;
font-size:14px;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:8px;
border:none;
}

.chat-input button{
background:#0a1f44;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div></div>

<div class="logo-section">
<img src="logo - Copy.jpeg">
<div class="logo-text">ARK Analytics Academy</div>
</div>

<a href="login.html" class="login-btn">Login</a>

</div>

<div class="tagline">
Empowering Your Data Future
</div>

<!-- TITLE -->

<div class="title">
Master the Language of Data & Analytics
</div>

<!-- COURSES -->

<div class="course-grid">

<div class="course-card">
<img src="alteryx.png">
</div>

<div class="course-card">
<img src="python.png">
</div>

<div class="course-card">
<img src="tableau.png">
</div>

<div class="course-card">
<img src="powerbi.png">
</div>

<div class="course-card">
<img src="sql.png">
</div>

<div class="course-card">
<img src="excel.png">
</div>

</div>

<!-- QR -->

<div class="qrbox">
<p>Scan to Enroll</p>
<img src="qr-code.png">
</div>

<!-- CHATBOT ICON -->

<img src="chatbot - Copy.png" class="chatbot-icon" onclick="toggleChat()" ontouchstart="toggleChat()">

<!-- CHAT WINDOW -->

<div class="chat-window" id="chatWindow">

<div class="chat-header">
ARK AI Assistant
<span style="float:right;cursor:pointer;" onclick="toggleChat()">✖</span>
</div>

<div class="chat-body" id="chatBody">
👋 Hello! Welcome to ARK Analytics Academy.
</div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- FOOTER -->

<div class="footer">
<a href="mobile.html">Home</a>
<a href="mobile-about.html">About</a>
<a href="mobile-privacy.html">Privacy</a>
<a href="mobile-contact.html">Contact</a>
</div>

<script>

let step = 1;
let username = "";

function toggleChat(){
let chat=document.getElementById("chatWindow");

if(chat.style.display==="flex"){
chat.style.display="none";
}else{
chat.style.display="flex";
}
}

function sendMessage(){

let input=document.getElementById("userInput");
let body=document.getElementById("chatBody");

let text=input.value.toLowerCase();

body.innerHTML += "<p><b>You:</b> "+text+"</p>";

let reply="";

if(step===1){
reply="Hello 👋 What is your name?";
step=2;
}

else if(step===2){
username=text;
reply="Hi "+username+"! Are you a student or working professional?";
step=3;
}

else if(step===3){

if(text.includes("student")){
reply="Great! As a student you can start learning Data Analytics with us.";
}else{
reply="Nice! Upskilling in analytics will boost your career.";
}

reply += "<br><br>We teach Python, SQL, Tableau, Power BI, Alteryx and Advanced Excel.";

step=4;
}

else if(step===4){
reply="Please scan the QR code above to enroll.";
step=5;
}

else if(step===5){
reply="For further details call 📞 8309434566 or email 📧 aabhilash712@gmail.com.";
}

body.innerHTML += "<p><b>ARK AI:</b> "+reply+"</p>";

body.scrollTop = body.scrollHeight;

input.value="";
}

</script>

</body>
</html>
```
